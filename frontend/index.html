<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Liste des Clients</h1>
    <div class="container">
        <div class="content">
            <div class="filter-bar">
                <label for="filter-status">Filtrer par statut :</label>
                <select id="filter-status">
                    <option value="all">Tous</option>
                    <option value="Actif">Actif</option>
                    <option value="Prospect">Prospect</option>
                    <option value="Fidele">Fidèle</option>
                </select>
            </div>
            <table id="clients-table">
                <thead>
                <tr>
                    <th>Nom</th>
                    <th>Entreprise</th>
                    <th>Email</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Ouedraogo Aliya</td>
                    <td>Apple</td>
                    <td>aliya@gmail.com</td>
                    <td><span class="statut">Actif</span></td>
                </tr>
                <tr>
                    <td>Sacko Yackouba</td>
                    <td>Microsoft</td>
                    <td>sacko@gmail.com</td>
                    <td><span class="statut">Prospect</span></td>
                </tr>
                <tr>
                    <td>Zongo Sharif</td>
                    <td>Oracle</td>
                    <td>zongo@gmail.com</td>
                    <td><span class="statut">Fidele</span></td>
                </tr>
                <tr>
                    <td>Ouattara Latif</td>
                    <td>Amazon</td>
                    <td>latif@gmail.com</td>
                    <td><span class="statut">Actif</span></td>
                </tr>
                <tr>
                    <td>Nonkane Shahida</td>
                    <td>Apple</td>
                    <td>sharif@gmail.com</td>
                    <td><span class="statut">Actif</span></td>
                </tr>
            </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const select = document.getElementById('filter-status');
            const rows = Array.from(document.querySelectorAll('#clients-table tbody tr'));

            select.addEventListener('change', () => {
                const selectedStatus = select.value;

                rows.forEach((row) => {
                    const statusCell = row.querySelector('td:last-child .statut');
                    const status = statusCell ? statusCell.textContent.trim() : '';
                    row.style.display = (selectedStatus === 'all' || status === selectedStatus) ? '' : 'none';
                });
            });
        });
    </script>
</body>
</html>
